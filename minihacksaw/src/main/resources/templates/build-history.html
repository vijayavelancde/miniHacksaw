<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout(~{::content})">

<div th:fragment="content">

    <!-- Page Header -->
    <div class="page-header-wrapper">

        <h2>Build History</h2>

    </div>

    <!-- Summary Cards -->
    <div style="display:flex; gap:20px; margin-bottom:25px;">

        <div class="card summary-card">
            <div>
                <h3>Total Builds</h3>
                <div class="metric"
                     th:text="${builds.size()}">0</div>
            </div>
        </div>

        <div class="card summary-card">
            <div>
                <h3>Blocked</h3>
                <div class="metric danger"
                     th:text="${blockedCount}">0</div>
            </div>
        </div>

        <div class="card summary-card">
            <div>
                <h3>Safe</h3>
                <div class="metric safe"
                     th:text="${safeCount}">0</div>
            </div>
        </div>

    </div>

    <!-- Build Table -->
    <div class="card">

        <table class="styled-table">

            <thead>
            <tr>
                <th>Build ID</th>
                <th>Product</th>
                <th>Scan Time</th>
                <th>Status</th>
                <th>Total Findings</th>
                <th>Critical</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="build : ${builds}">

                <!-- Build ID -->
                <td style="font-family:monospace;"
                    th:text="${build.buildId}"></td>

                <!-- Product -->
                <td th:text="${build.productId}"></td>

                <!-- Scan Time -->
                <td th:text="${build.scanTime}"></td>

                <!-- Status -->
                <td>

                    <span class="status-badge"
                          th:classappend="${build.status == 'BLOCKED'} ? ' status-failed' : ' status-safe'"
                          th:text="${build.status}">
                    </span>

                </td>

                <!-- Total Findings -->
                <td th:text="${build.totalFindings}"></td>

                <!-- Critical -->
                <td th:text="${build.criticalFindings}"></td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</html>
