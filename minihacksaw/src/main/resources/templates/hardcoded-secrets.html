<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout(~{::content})">

<div th:fragment="content">

    <!-- Page Header -->
    <div class="page-header-wrapper">

        <!-- Left: Page Title -->
        <h2>Hardcoded Secrets</h2>

        <!-- Right: Product Selector -->
        <form method="get"
              th:action="@{/secrets}"
              class="filter-form">

            <select name="productId"
                    class="app-dropdown"
                    onchange="this.form.submit()"
                    required>

                <option value=""
                        disabled
                        th:selected="${selectedProduct == null}">
                    Select Product
                </option>

                <option th:each="product : ${products}"
                        th:value="${product.productId}"
                        th:text="${product.name}"
                        th:selected="${selectedProduct != null 
                                  and selectedProduct.productId == product.productId}">
                </option>

            </select>

        </form>

    </div>

    <!-- Summary Cards -->
    <div th:if="${selectedProduct != null}"
         style="display:flex; gap:20px; margin-bottom:25px;">

        <div class="card summary-card">
            <div>
                <h3>Critical Secrets</h3>
                <div class="metric danger"
                     th:text="${criticalCount}">0</div>
            </div>
        </div>

        <div class="card summary-card">
            <div>
                <h3>Total Secrets</h3>
                <div class="metric"
                     th:text="${totalSecrets}">0</div>
            </div>
        </div>

    </div>

    <!-- Secrets Table -->
    <div th:if="${secrets != null and !#lists.isEmpty(secrets)}"
         class="card">

        <table class="styled-table" style="margin-top:10px;">

            <thead>
            <tr>
                <th>Secret Type</th>
                <th>Severity</th>
                <th>Description</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="secret : ${secrets}"
                th:class="'severity-row ' + ${#strings.toLowerCase(secret.severity)}">

                <!-- Secret Type -->
                <td style="font-weight:600;">
                    <i class="fa-solid fa-key"
                       style="margin-right:8px;color:#dc2626;"></i>
                    <span th:text="${secret.title}"></span>
                </td>

                <!-- Severity -->
                <td>
                    <span class="severity-badge"
                          th:classappend="' ' + ${#strings.toLowerCase(secret.severity)}"
                          th:text="${secret.severity}">
                    </span>
                </td>

                <!-- Description -->
                <td th:text="${secret.description}"></td>

            </tr>

            </tbody>

        </table>

    </div>

    <!-- Empty State -->
    <div th:if="${secrets == null or #lists.isEmpty(secrets)}"
         class="card empty-state">

        <i class="fa-solid fa-shield-halved"
           style="font-size:32px; color:#16a34a; margin-bottom:10px;"></i>

        <div>No hardcoded secrets detected.</div>

    </div>

</div>

</html>
