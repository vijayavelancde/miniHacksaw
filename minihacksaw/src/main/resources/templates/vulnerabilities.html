<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout(~{::body})">

<body>

<h2>Vulnerability Report</h2>

<div class="card">
    <h3>Total Violations</h3>
    <p th:text="${vulnerabilities.size()}"></p>
</div>

<div class="card">
    <h3>Blocking Violations</h3>
    <p class="danger" th:text="${criticalCount}"></p>
</div>

<div class="card">
    <h3>Build Status</h3>
    <p class="danger"
       th:text="${criticalCount > 0 ? 'BLOCKED' : 'SAFE'}">
    </p>
</div>

<div class="card">

    <table class="styled-table">
        <thead>
            <tr>
                <th>Title</th>
                <th>Severity</th>
                <th>Description</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="v : ${vulnerabilities}">
                <td th:text="${v.title}"></td>

                <td>
                    <span class="severity-badge"
                          th:text="${v.severity}"
                          th:classappend="' ' + ${v.severity.toLowerCase()}">
                    </span>
                </td>

                <td th:text="${v.description}"></td>
            </tr>
        </tbody>
    </table>

</div>
</body>
</html>
