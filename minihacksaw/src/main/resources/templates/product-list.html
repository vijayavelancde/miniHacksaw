<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout(~{::body})">

<body>

<div class="page-header product-header">

    <h2>Registered Products</h2>

    <div class="header-actions">

        <button type="button"
                class="btn danger-btn"
                id="deleteSelectedBtn"
                style="display:none;">
            Delete Selected
        </button>

        <a th:href="@{/products/add}" class="primary-btn">
            + Onboard Product
        </a>

    </div>

</div>

<div class="card product-card">

    <table class="product-table">
        <thead>
        <tr>
            <th class="checkbox-col">
                <input type="checkbox" id="selectAll">
            </th>
            <th>ID</th>
            <th>Name</th>
            <th>Type</th>
            <th class="actions-col">Actions</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="product : ${products}">
            <td class="checkbox-col">
                <input type="checkbox"
                       class="rowCheckbox"
                       th:value="${product.productId}">
            </td>

            <td th:text="${product.productId}"></td>
            <td th:text="${product.name}"></td>
            <td th:text="${product.productType}"></td>

            <td class="actions-col action-buttons">

                <!-- Edit -->
                <a th:href="@{/products/edit/{id}(id=${product.productId})}"
                   class="icon-btn"
                   title="Edit">
                    <i class="fa-solid fa-pen"></i>
                </a>

                <!-- View Report -->
                <a th:href="@{'/products/' + ${product.productId} + '/vulnerabilities'}"
                   class="icon-btn"
                   title="View Report">
                    <i class="fa-solid fa-bug"></i>
                </a>

            </td>
        </tr>

        <tr th:if="${#lists.isEmpty(products)}">
            <td colspan="5" class="empty-state">
                No products registered yet.
            </td>
        </tr>

        </tbody>
    </table>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const selectAll = document.getElementById("selectAll");
    const deleteBtn = document.getElementById("deleteSelectedBtn");

    function updateDeleteVisibility() {
        const checked = document.querySelectorAll(".rowCheckbox:checked");
        deleteBtn.style.display = checked.length > 0 ? "inline-block" : "none";
    }

    if (selectAll) {
        selectAll.addEventListener("change", function () {
            document.querySelectorAll(".rowCheckbox")
                .forEach(cb => cb.checked = this.checked);
            updateDeleteVisibility();
        });
    }

    document.querySelectorAll(".rowCheckbox")
        .forEach(cb => cb.addEventListener("change", updateDeleteVisibility));

    if (deleteBtn) {
        deleteBtn.addEventListener("click", function () {
            const selected = document.querySelectorAll(".rowCheckbox:checked");

            selected.forEach(cb => {
                window.location.href = "/products/delete/" + cb.value;
            });
        });
    }

});
</script>

</body>
</html>
